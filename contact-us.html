<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="keywords" content="Bask Ray">

<body>
    <!-- page wrapper -->

    <div class="page-wrapper">


        <!-- header -->
        <div id="header"></div>
        <!-- header end-->

        <!-- main -->
        <main class="main">

            <!-- Banner -->
            <section class="breadcrumb-section" data-img-src="assets/images/breadcrumb.png">
                <div class="container">
                    <div class="row">
                        <div class="col-lg-12">
                            <!-- breadcrumb content start -->
                            <div class="breadcrumb-content">
                                <!-- breadcrumb title start -->
                                <div class="breadcrumb-title wow fadeInUp" data-wow-delay=".2s">
                                    <h1>Contact Us</h1>
                                </div>
                                <!-- breadcrumb title end -->
                                <!-- nav start -->
                                <nav aria-label="breadcrumb" class="wow fadeInUp" data-wow-delay=".3s">
                                    <ol class="breadcrumb">
                                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                                        <li class="breadcrumb-item active" aria-current="page">Contact Us</li>
                                    </ol>
                                </nav>
                                <!-- nav end -->
                            </div>
                            <!-- breadcrumb content end -->
                        </div>
                    </div>
                </div>

            </section>
            <!-- Banner -->

            <!-- Contact -->
            <section class="contact-section pt-100 md-pt-80 md-pb-50">
                <div class="container">
                    <div class="row justify-content-between">
                        <div class="col-lg-5">
                            <!-- section title start -->
                            <div class="section-title wow fadeInUp" data-wow-delay=".2s">
                                <span class="sub-title">Contact Me</span>
                                <h2>Stay connect with us today</h2>
                            </div>
                            <!-- section title end -->
                            <!-- contact item wrapper start -->
                            <div class="contact-item-wrapper">
                                <!-- contact items start -->
                                <div class="contact-item wow fadeInUp" data-wow-delay=".5s">
                                    <div class="contact-icon"><i class="fa-solid fa-phone-volume"></i></div>
                                    <div class="contact-content">
                                        <p>Call Now</p>
                                        <h3>+91 7745040808</h3>
                                    </div>
                                </div>
                                <!-- contact items end -->
                                <!-- contact items start -->
                                <div class="contact-item wow fadeInUp" data-wow-delay=".4s">
                                    <div class="contact-icon"><i class="fa-solid fa-envelope"></i></div>
                                    <div class="contact-content">
                                        <p>Email</p>
                                        <h3>infobaskray@gmail.com</h3>
                                    </div>
                                </div>
                                <!-- contact items end -->
                                <!-- contact items start -->
                                <div class="contact-item wow fadeInUp" data-wow-delay=".3s">
                                    <div class="contact-icon"><i class="fa-solid fa-location-dot"></i></div>
                                    <div class="contact-content">
                                        <p>Address</p>
                                        <h3>212, GRAND HORIZON, NEXT TO HOTEL BRAHMA, MANIKBAG, SINHGAD ROAD, PUNE
                                            411041</h3>
                                    </div>
                                </div>
                                <!-- contact items end -->
                            </div>
                            <!-- contact item wrapper end -->

                            <div class="contact-social-links wow fadeInUp" data-wow-delay=".6s">
                                <span class="follow-text">Follow Us Today :</span>
                                <ul class="social-icon">
                                    <li>
                                        <a href="#" aria-label="instagram"><i class="fa-brands fa-instagram"></i></a>
                                    </li>
                                    <li>
                                        <a href="#" aria-label="facebook"><i class="fa-brands fa-facebook-f"></i></a>
                                    </li>
                                    <li>
                                        <a href="#" aria-label="twitter"><i class="fa-brands fa-x-twitter"></i></a>
                                    </li>
                                    <li>
                                        <a href="#" aria-label="pinterest"><i class="fa-brands fa-pinterest-p"></i></a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <!-- contact form box start -->
                            <div class="contact-form-box">
                                <div class="section-title">
                                    <h2>Send us a message</h2>
                                </div>
                                <!-- default-form start -->
                                <div class="default-form contact-form">
                                    <form id="contactForm">
                                        <div class="row">
                                            <div class="col-lg-12">
                                                <div class="form-group">
                                                    <div class="form-floating field-inner">
                                                        <input id="name" class="form-control" name="name" type="text"
                                                            autocomplete="off" placeholder="Name Here"
                                                            required="required">
                                                        <label for="name">Name*</label>
                                                        <span class="error" id="name-error"></span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-lg-12">
                                                <div class="form-group">
                                                    <div class="form-floating field-inner">
                                                        <input id="email" class="form-control" name="email" type="email"
                                                            autocomplete="off" placeholder="Email Here"
                                                            required="required">
                                                        <label for="email">Email*</label>
                                                        <span class="error" id="email-error"></span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-lg-12">
                                                <div class="form-group">
                                                    <div class="form-floating field-inner">
                                                        <input id="phone" class="form-control" name="phone" type="text"
                                                            autocomplete="off" placeholder="Phone Number Here"
                                                            required="required">
                                                        <label for="phone">Phone Number*</label>
                                                        <span class="error" id="phone-error"></span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-lg-12">
                                                <div class="form-group">
                                                    <div class="form-floating field-inner">
                                                        <input id="subject" class="form-control" name="subject"
                                                            type="text" autocomplete="off" placeholder="Subject Here"
                                                            required="required">
                                                        <label for="subject">Subject*</label>
                                                        <span class="error" id="subject-error"></span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-lg-12">
                                                <div class="form-group">
                                                    <div class="form-floating field-inner">
                                                        <textarea id="message" class="form-control" name="message"
                                                            autocomplete="off" placeholder="Type Message Here"
                                                            required="required"></textarea>
                                                        <label for="message">Message*</label>
                                                        <span class="error" id="message-error"></span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-lg-12">
                                                <div class="contact-btn-wapper mt-10">
                                                    <button type="submit" class="theme-button style-1"
                                                        data-text="Send Message">
                                                        <span data-text="Send Message">Send Message</span>
                                                        <i class="fa-solid fa-arrow-right"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="ajax-response"></div>
                                    </form>
                                </div>
                                <!-- default-form end -->
                            </div>
                            <!-- contact form box end -->
                        </div>
                    </div>
                </div>
            </section>
            <!-- Contact -->

        </main>
        <!-- main -->

        <!-- footer -->
        <div id="footer"></div>


        <!-- footer -->
        <script>
            document.getElementById("contactForm").addEventListener("submit", function (e) {
                e.preventDefault();

                let name = document.getElementById("name").value;
                let email = document.getElementById("email").value;
                let phone = document.getElementById("phone").value;
                let subject = document.getElementById("subject").value;
                let message = document.getElementById("message").value;

                let whatsappMessage =
                    "New Contact Form Enquiry:%0A%0A" +
                    "Name: " + name + "%0A" +
                    "Email: " + email + "%0A" +
                    "Phone: " + phone + "%0A" +
                    "Subject: " + subject + "%0A" +
                    "Message: " + message;

                let whatsappNumber = "917745040808";

                let url = "https://wa.me/" + whatsappNumber + "?text=" + whatsappMessage;

                window.open(url, "_blank");
            });
        </script>
        <script>
            function loadHTML(id, file) {
                fetch(file)
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById(id).innerHTML = data;
                    });
            }

            loadHTML("header", "header.html");
            loadHTML("footer", "footer.html");
        </script>
    </div>

    <script src="assets/js/SmoothScroll.js"></script>
    <!-- main Js -->
    <script src="assets/js/main.js"></script>
</body>
