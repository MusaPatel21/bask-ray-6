<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bask Ray">
    <meta name="keywords" content="Bask Ray">
    <!-- page title -->
    <title>Bask Ray</title>
    <!-- favicon icon -->
    <link rel="shortcut icon" href="assets/images/fav.png" type="image/x-icon">
    <!-- font awesome css -->
    <link rel="stylesheet" href="assets/css/all.min.css">
    <!-- bootstrap css -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <!-- swiper css -->
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css">
    <!-- image comparision css -->

<body>
    <!-- page wrapper -->

    <div class="page-wrapper">


        <!-- header -->
        <div id="header"></div>
        <!-- header end-->

        <!-- main -->
        <main class="main">

            <!-- Banner -->
            <section class="breadcrumb-section" data-img-src="assets/images/breadcrumb.png">
                <div class="container">
                    <div class="row">
                        <div class="col-lg-12">
                            <!-- breadcrumb content start -->
                            <div class="breadcrumb-content">
                                <!-- breadcrumb title start -->
                                <div class="breadcrumb-title wow fadeInUp" data-wow-delay=".2s">
                                    <h1>Gallery</h1>
                                </div>
                                <!-- breadcrumb title end -->
                                <!-- nav start -->
                                <nav aria-label="breadcrumb" class="wow fadeInUp" data-wow-delay=".3s">
                                    <ol class="breadcrumb">
                                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                                        <li class="breadcrumb-item active" aria-current="page">Gallery</li>
                                    </ol>
                                </nav>
                                <!-- nav end -->
                            </div>
                            <!-- breadcrumb content end -->
                        </div>
                    </div>
                </div>

            </section>
            <!-- Banner -->

            <!-- Gallery -->
            <!-- GLightbox CSS -->
            <link href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" rel="stylesheet">

            <section class="py-5">
                <div class="container text-center">

                    <h2 class="mb-4">Gallery</h2>

                    <div class="row g-4">

                        <!-- Image 1 -->
                        <div class="col-lg-3 col-md-4 col-6">
                            <a href="assets/images/gallery/1.jpg" class="glightbox gallery-item">
                                <img src="assets/images/gallery/1.jpg" class="img-fluid rounded gallery-img"
                                    alt="gallery image">
                            </a>
                        </div>

                        <!-- Image 2 -->
                        <div class="col-lg-3 col-md-4 col-6">
                            <a href="assets/images/gallery/2.jpg" class="glightbox gallery-item">
                                <img src="assets/images/gallery/2.jpg" class="img-fluid rounded gallery-img"
                                    alt="gallery image">
                            </a>
                        </div>

                        <!-- Image 3 -->
                        <div class="col-lg-3 col-md-4 col-6">
                            <a href="assets/images/gallery/3.jpg" class="glightbox gallery-item">
                                <img src="assets/images/gallery/3.jpg" class="img-fluid rounded gallery-img"
                                    alt="gallery image">
                            </a>
                        </div>

                        <!-- Image 4 -->
                        <div class="col-lg-3 col-md-4 col-6">
                            <a href="assets/images/gallery/4.jpg" class="glightbox gallery-item">
                                <img src="assets/images/gallery/4.jpg" class="img-fluid rounded gallery-img"
                                    alt="gallery image">
                            </a>
                        </div>


                    </div>
                </div>
            </section>
            <style>
                .gallery-img {
                    width: 100%;
                    height: 280px;
                    object-fit: cover;
                    border-radius: 10px;
                    transition: 0.3s ease;
                }

                .gallery-img:hover {
                    transform: scale(1.03);
                }

                .gallery-item {
                    display: block;
                    overflow: hidden;
                    border-radius: 10px;
                }
            </style>
            <!-- GLightbox JS -->
            <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

            <script>
                const lightbox = GLightbox({
                    selector: '.glightbox'
                });
            </script>
            <!-- Gallery -->
        </main>
        <!-- main -->

        <!-- footer -->
        <div id="footer"></div>


        <!-- footer -->

        <script>
            function loadHTML(id, file) {
                fetch(file)
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById(id).innerHTML = data;
                    });
            }

            loadHTML("header", "header.html");
            loadHTML("footer", "footer.html");
        </script>
    </div>
    <!-- page wrapper -->

    <script src="assets/js/jquery-3.7.1.min.js"></script>
